name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, vet, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build ./...

      - name: Vet
        run: GOOS=linux GOARCH=amd64 go vet ./...

      - name: Test
        # The config package has no Linux-kernel dependency and runs on any OS.
        # Packages with //go:build linux are excluded automatically on
        # ubuntu-latest when GOOS is not set differently, but they are still
        # included since the runner IS linux — so we run tests explicitly only
        # for the platform-independent packages.
        run: go test -v -count=1 ./internal/config/...
